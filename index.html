<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童職業體驗營 - 6回合終極生存版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .hospitalized-mask { filter: grayscale(100%); opacity: 0.75; position: relative; pointer-events: none; }
        .hospitalized-mask::after { content: "🏥 暫停行動一回合"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); background: rgba(220, 38, 38, 0.9); color: white; padding: 5px 15px; font-weight: 900; border-radius: 8px; border: 2px solid white; font-size: 1.2rem; white-space: nowrap; z-index: 10; }
        details > summary { list-style: none; outline: none; cursor: pointer; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 antialiased flex flex-col">

    <header class="bg-slate-900 text-white px-6 py-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">⏳</span>
            <h1 class="text-xl font-bold tracking-wide">生涯模擬系統 <span class="text-xs bg-rose-600 px-2 py-0.5 rounded text-white ml-2">6 回合制</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <div id="global-timer" class="bg-slate-800 px-4 py-1.5 rounded-full font-bold text-sm border border-slate-600 shadow-inner">載入中...</div>
        </div>
    </header>

    <main class="flex-1 max-w-[1800px] w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-80px)] overflow-hidden">
        
        <section class="lg:col-span-8 bg-slate-200/50 rounded-2xl shadow-inner border border-slate-300 p-4 flex flex-col h-full overflow-hidden relative">
            <div class="flex justify-between items-end mb-4 border-b border-slate-300 pb-4">
                <div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest bg-white px-2 py-1 rounded shadow-sm">當前進度</span>
                    <h2 id="big-timer-display" class="text-3xl font-black text-slate-900 mt-1">Round 1：第一年 上半年</h2>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-[10px] text-slate-400 font-bold">主動抉擇階段 倒數</div>
                        <div id="countdown-display" class="text-3xl font-black text-indigo-600 tabular-nums">03:00</div>
                    </div>
                    <div class="flex flex-col space-y-1">
                        <button onclick="timer.start()" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 text-[10px] font-bold px-2 py-1 rounded">▶ 開始</button>
                        <button onclick="timer.reset()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px] font-bold px-2 py-1 rounded">🔄 重置</button>
                    </div>
                </div>
            </div>

            <div id="leaderboard-grid" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 custom-scrollbar pb-10"></div>
            
            <div class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-slate-300 p-4 flex justify-between items-center shadow-lg">
                <button onclick="executeBatchDraw()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-black text-lg px-8 py-3 rounded-xl shadow-md transition transform hover:scale-105">
                    🎲 全組集體命運抽卡
                </button>
                <button onclick="advanceRound()" class="bg-slate-800 hover:bg-slate-900 text-white font-bold px-6 py-3 rounded-xl shadow transition text-sm">
                    推進至下一回合 ➡️
                </button>
            </div>
        </section>

        <section class="lg:col-span-4 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
            <div class="flex space-x-1 p-2 bg-slate-100 border-b border-slate-200">
                <button id="tab-play-btn" onclick="switchTab('play')" class="flex-1 py-2 rounded font-bold text-sm bg-white shadow text-indigo-700 transition">🎮 手動操作區</button>
                <button id="tab-admin-btn" onclick="switchTab('admin')" class="flex-1 py-2 rounded font-bold text-sm text-slate-500 hover:text-slate-800 transition">⚙️ 後台設定</button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-4">
                <div id="tab-play" class="space-y-4">
                    <div class="bg-indigo-50 border border-indigo-200 p-3 rounded-lg text-xs text-indigo-800 font-medium">💡 抽卡結束後，各組若要消耗代幣，請在此區域點擊對應技能結算。</div>
                    <div id="action-team-list" class="space-y-3"></div>
                </div>

                <div id="tab-admin" class="hidden space-y-4">
                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">1. 回合與基本設定</summary>
                        <div class="p-4 space-y-3">
                            <label class="block text-xs font-bold text-slate-600">6 回合自訂名稱 (逗號隔開)</label>
                            <input type="text" id="cfg-rounds" class="w-full border rounded p-1.5 text-xs font-mono" onchange="updateConfig()">
                            <label class="block text-xs font-bold text-slate-600 mt-2">倒數計時器 (秒)</label>
                            <input type="number" id="cfg-timer" class="w-full border rounded p-1.5 text-xs" onchange="updateConfig()">
                        </div>
                    </details>

                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">2. 結局稱號系統</summary>
                        <div class="p-4"><div id="admin-titles-list" class="space-y-2"></div><button onclick="addNewTitle()" class="w-full mt-2 bg-indigo-100 text-indigo-700 text-xs font-bold py-1.5 rounded">+ 新增規則</button></div>
                    </details>

                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">3. 隊伍分配</summary>
                        <div class="p-4"><div id="admin-team-list" class="space-y-2"></div><button onclick="addNewTeam()" class="w-full mt-3 bg-indigo-100 text-indigo-700 text-xs font-bold py-1.5 rounded">+ 新增隊伍</button></div>
                    </details>

                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden" open>
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">4. 主動抉擇技能設定</summary>
                        <div class="p-4"><div id="admin-action-list" class="space-y-3"></div><button onclick="addNewAction()" class="w-full mt-3 bg-indigo-100 text-indigo-700 text-xs font-bold py-1.5 rounded">+ 新增技能</button></div>
                    </details>

                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden" open>
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">5. 職業卡池編輯</summary>
                        <div class="p-4 space-y-4">
                            <div class="flex space-x-2"><input type="text" id="new-profession-name" placeholder="新職業名稱" class="flex-1 border rounded px-2 py-1 text-xs"><button onclick="addNewProfession()" class="bg-emerald-600 text-white text-xs font-bold px-3 py-1 rounded">建立職業</button></div>
                            <div id="admin-prof-list" class="space-y-4 border-t pt-4"></div>
                        </div>
                    </details>

                    <div class="bg-rose-50 p-3 rounded-xl border border-rose-200 flex flex-wrap gap-2">
                        <button onclick="exportData()" class="bg-indigo-600 text-white text-[10px] font-bold px-3 py-1.5 rounded">📤 匯出設定檔</button>
                        <label class="bg-emerald-600 text-white text-[10px] font-bold px-3 py-1.5 rounded cursor-pointer">📥 匯入 <input type="file" class="hidden" onchange="importData(event)"></label>
                        <button onclick="resetToDefaultState()" class="bg-red-600 text-white text-[10px] font-bold px-3 py-1.5 rounded">⚠️ 清除重置</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="batch-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl w-full max-w-5xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="bg-slate-900 p-4 text-white text-center relative"><h3 class="text-2xl font-black text-amber-400">🔮 命運結算報告</h3><p class="text-xs text-slate-400 mt-1" id="batch-modal-round"></p></div>
            <div id="batch-results-grid" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 custom-scrollbar bg-slate-100"></div>
            <div class="bg-white p-4 border-t flex justify-center"><button onclick="closeBatchModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-10 py-3 rounded-xl w-full md:w-auto">確認套用數值</button></div>
        </div>
    </div>

    <div id="ending-modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
        <div class="bg-slate-800 rounded-3xl max-w-4xl w-full overflow-hidden border-4 border-amber-500 p-8 text-center flex flex-col max-h-[90vh]">
            <h2 class="text-4xl font-black text-amber-400 mb-6 tracking-widest">🏆 3年生涯 終極結算</h2>
            <div id="ending-results" class="flex-1 overflow-y-auto custom-scrollbar grid grid-cols-1 md:grid-cols-2 gap-4 text-left"></div>
            <div class="pt-6 mt-4 border-t border-slate-600"><button onclick="resetToDefaultState()" class="bg-amber-600 hover:bg-amber-500 text-white font-black px-8 py-3 rounded-xl text-lg">開啟全新人生局</button></div>
        </div>
    </div>

    <script>
        const DEFAULT_STATE = {
            config: {
                rounds: ["R1：第一年 上半年", "R2：第一年 下半年", "R3：第二年 上半年", "R4：第二年 下半年", "R5：第三年 上半年", "R6：第三年 下半年"],
                timer: 180,
                titles: [
                    { name: "爆肝防腐劑總裁", minC: 15, maxE: null, minE: null, minM: null, maxM: 3 },
                    { name: "快樂窮光蛋", minC: null, maxC: 2, minE: null, maxE: null, minM: 8, maxM: null },
                    { name: "平庸社畜", minC: null, maxC: null, minE: null, maxE: null, minM: null, maxM: null }
                ],
                actions: [
                    { id: "a1", name: "A. 兼差加班", tCost: 1, cCost: 0, eCost: 3, mCost: 1, tGain: 0, cGain: 3, eGain: 0, mGain: 0 },
                    { id: "a2", name: "B. 自費就醫", tCost: 1, cCost: 2, eCost: 0, mCost: 0, tGain: 0, cGain: 0, eGain: 2, mGain: 2 },
                    { id: "a3", name: "C. 佛系躺平", tCost: 1, cCost: 0, eCost: 0, mCost: 0, tGain: 0, cGain: 0, eGain: 4, mGain: 0 }
                ]
            },
            teams: [
                { id: "t1", name: "火箭隊", profession: "工程師", energy: 10, mind: 10, coin: 0, tokens: 2, status: 'normal', actionUsed: false },
                { id: "t2", name: "夢想家", profession: "藝術家", energy: 10, mind: 10, coin: 0, tokens: 2, status: 'normal', actionUsed: false }
            ],
            professions: {
                "工程師": { pools: Array(6).fill().map((_, i) => [{ id: `e_${i}_1`, name: `R${i+1}日常修Bug`, w: 50, text: "平安無事的一天。", e: -1, m: -1, c: 2 }, { id: `e_${i}_2`, name: `R${i+1}系統崩潰`, w: 20, text: "搶修！", e: -4, m: -3, c: 5 }]) },
                "藝術家": { pools: Array(6).fill().map((_, i) => [{ id: `a_${i}_1`, name: `R${i+1}靈感湧現`, w: 50, text: "完美作品！", e: -2, m: 3, c: 3 }, { id: `a_${i}_2`, name: `R${i+1}遇奧客`, w: 20, text: "改稿...", e: -2, m: -4, c: 1 }]) }
            },
            currentRound: 1, batchResults: null
        };

        let state = {};
        let timerInterval = null;
        let timeLeft = 0;

        const timer = {
            start: () => {
                if(timerInterval) clearInterval(timerInterval);
                if(timeLeft <= 0) timeLeft = state.config.timer;
                timerInterval = setInterval(() => { timeLeft--; timer.updateStr(); if(timeLeft <= 0) { clearInterval(timerInterval); alert("⏳ 時間到！"); } }, 1000);
            },
            reset: () => { clearInterval(timerInterval); timeLeft = state.config.timer; timer.updateStr(); },
            updateStr: () => { document.getElementById('countdown-display').innerText = `${Math.floor(timeLeft/60).toString().padStart(2,'0')}:${(timeLeft%60).toString().padStart(2,'0')}`; }
        };

        function init() {
            try { state = JSON.parse(localStorage.getItem("camp_sim_v3")) || JSON.parse(JSON.stringify(DEFAULT_STATE)); } catch(e) { state = JSON.parse(JSON.stringify(DEFAULT_STATE)); }
            Object.values(state.professions).forEach(p => { if(!p.pools || p.pools.length !== 6) p.pools = Array(6).fill().map(()=>[]); });
            timeLeft = state.config.timer; saveState(); syncAdmin(); renderAll();
        }

        function saveState() { localStorage.setItem("camp_sim_v3", JSON.stringify(state)); }
        function resetToDefaultState() { if(confirm("確定重置嗎？")) { localStorage.removeItem("camp_sim_v3"); location.reload(); } }

        window.switchTab = function(tab) {
            document.getElementById('tab-play').classList.toggle('hidden', tab !== 'play');
            document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('tab-play-btn').className = tab==='play' ? "flex-1 py-2 rounded font-bold text-sm bg-white shadow text-indigo-700" : "flex-1 py-2 rounded font-bold text-sm text-slate-500 hover:text-slate-800";
            document.getElementById('tab-admin-btn').className = tab==='admin' ? "flex-1 py-2 rounded font-bold text-sm bg-white shadow text-indigo-700" : "flex-1 py-2 rounded font-bold text-sm text-slate-500 hover:text-slate-800";
        };

        function renderAll() {
            if(state.currentRound > 6) return showEnding();
            document.getElementById('big-timer-display').innerText = state.config.rounds[state.currentRound - 1] || `Round ${state.currentRound}`;
            timer.updateStr(); renderLeaderboard(); renderActionTab();
        }

        function renderLeaderboard() {
            document.getElementById('leaderboard-grid').innerHTML = state.teams.map((t, i) => {
                const isHosp = t.status.includes('hospitalized');
                return `<div class="bg-white rounded-2xl shadow-sm border p-4 ${isHosp ? 'hospitalized-mask' : ''}">
                    <div class="flex justify-between items-center mb-3">
                        <div><h3 class="text-xl font-black">${t.name}</h3><div class="text-[10px] bg-slate-100 px-2 py-0.5 rounded inline-block mt-1">${t.profession}</div></div>
                        <div class="flex space-x-2"><span class="bg-amber-100 text-amber-700 px-2 py-1 rounded-lg">🪙 ${t.coin}</span><span class="bg-indigo-100 text-indigo-700 px-2 py-1 rounded-lg">🎟️ ${t.tokens}</span></div>
                    </div>
                    <div class="space-y-3">
                        <div><div class="flex justify-between text-[11px] font-bold text-slate-500 mb-1"><span>🔋 精力</span><span>${t.energy}/10</span></div><div class="h-2.5 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-emerald-500" style="width: ${Math.min(100, t.energy*10)}%"></div></div></div>
                        <div><div class="flex justify-between text-[11px] font-bold text-slate-500 mb-1"><span>❤️ 心態</span><span>${t.mind}/10</span></div><div class="h-2.5 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-rose-500" style="width: ${Math.min(100, t.mind*10)}%"></div></div></div>
                    </div>
                    ${t.actionUsed && !isHosp ? `<div class="mt-3 text-center text-[10px] bg-slate-100 py-1 rounded font-bold">✓ 本回合已行動</div>` : ''}
                    <div class="mt-3 border-t pt-2 flex justify-end space-x-1 opacity-50"><button onclick="tweak(${i},'energy',1)" class="px-1 text-[9px] border rounded">🔋+</button><button onclick="tweak(${i},'mind',1)" class="px-1 text-[9px] border rounded">❤️+</button><button onclick="tweak(${i},'coin',1)" class="px-1 text-[9px] border rounded">🪙+</button><button onclick="tweak(${i},'tokens',1)" class="px-1 text-[9px] border rounded">🎟️+</button></div>
                </div>`;
            }).join('');
        }

        function renderActionTab() {
            document.getElementById('action-team-list').innerHTML = state.teams.map((t, i) => {
                const isHosp = t.status.includes('hospitalized');
                const canAct = !isHosp && !t.actionUsed && t.tokens > 0;
                let btns = state.config.actions.map(a => {
                    const ok = canAct && t.tokens>=a.tCost && t.coin>=a.cCost && t.energy>=a.eCost && t.mind>=a.mCost;
                    return `<button onclick="executeAction(${i}, '${a.id}')" ${ok?'':'disabled'} class="text-[10px] font-bold p-1.5 border rounded ${ok?'bg-white':'bg-slate-100 opacity-50'}">${a.name} (-${a.tCost}🎟️)</button>`;
                }).join('');
                return `<div class="border p-2 rounded bg-slate-50 ${isHosp?'opacity-50 grayscale':''}"><div class="flex justify-between mb-2"><span class="font-bold text-sm">${t.name}</span><span class="text-xs font-bold">${t.tokens} 🎟️</span></div><div class="grid grid-cols-2 gap-1">${isHosp ? '<span class="text-xs text-rose-500 font-bold">🏥 住院休養中</span>' : t.actionUsed ? '<span class="text-xs text-slate-400 font-bold">✓ 已行動</span>' : btns}</div></div>`;
            }).join('');
        }

        window.tweak = function(idx, f, a) { state.teams[idx][f] += a; checkHospital(state.teams[idx]); saveState(); renderAll(); };

        window.executeBatchDraw = function() {
            if(state.currentRound > 6) return;
            state.batchResults = state.teams.map((t, i) => {
                if(t.status === 'hospitalized_skipping') return { teamIdx: i, skipped: true, msg: "🏥 住院中，跳過抽卡。" };
                const pool = state.professions[t.profession]?.pools[state.currentRound-1] || [];
                if(!pool.length) return { teamIdx: i, skipped: true, msg: "⚠️ 無卡池設定！" };
                let rand = Math.random() * pool.reduce((s, c) => s + (parseInt(c.w)||0), 0);
                let drawn = pool.find(c => (rand -= (parseInt(c.w)||0)) <= 0) || pool[pool.length-1];
                return { teamIdx: i, card: drawn };
            });
            document.getElementById('batch-modal-round').innerText = state.config.rounds[state.currentRound-1];
            document.getElementById('batch-results-grid').innerHTML = state.batchResults.map(r => {
                const t = state.teams[r.teamIdx];
                if(r.skipped) return `<div class="bg-slate-200 p-4 rounded-xl text-center opacity-70"><h4>${t.name}</h4><p class="text-rose-600">${r.msg}</p></div>`;
                return `<div class="bg-white border p-4 rounded-xl relative"><span class="absolute -top-3 bg-indigo-600 text-white text-[10px] px-2 py-1 rounded">${t.name}</span><h4 class="font-bold mt-2">${r.card.name}</h4><p class="text-xs mb-2">${r.card.text}</p><div class="grid grid-cols-3 text-center border-t pt-2"><div class="text-[10px]">🔋${r.card.e}</div><div class="text-[10px]">❤️${r.card.m}</div><div class="text-[10px]">🪙${r.card.c}</div></div></div>`;
            }).join('');
            document.getElementById('batch-modal').classList.remove('hidden');
        };

        window.closeBatchModal = function() {
            state.batchResults.forEach(r => {
                if(!r.skipped && r.card) {
                    let t = state.teams[r.teamIdx];
                    t.energy += parseInt(r.card.e)||0; t.mind += parseInt(r.card.m)||0; t.coin += parseInt(r.card.c)||0;
                    checkHospital(t);
                }
            });
            document.getElementById('batch-modal').classList.add('hidden'); saveState(); renderAll(); alert("✅ 請開始抉擇計時！");
        };

        window.executeAction = function(i, aId) {
            let t = state.teams[i], a = state.config.actions.find(x => x.id === aId);
            if(!a || t.actionUsed) return;
            t.tokens -= a.tCost; t.coin -= a.cCost; t.energy -= a.eCost; t.mind -= a.mCost;
            t.tokens += a.tGain; t.coin += a.cGain; t.energy += a.eGain; t.mind += a.mGain;
            t.actionUsed = true; checkHospital(t); saveState(); renderAll();
        };

        function checkHospital(t) {
            if (t.status === 'normal' && (t.energy <= 0 || t.mind <= 0)) {
                t.status = 'hospitalized_new'; t.energy = Math.max(0, t.energy); t.mind = Math.max(0, t.mind);
                alert(`🚨 警告！【${t.name}】精/心歸零送醫！`);
            }
        }

        window.advanceRound = function() {
            if(!confirm(`結算並進入下一回？`)) return;
            state.teams.forEach(t => {
                if (t.status === 'hospitalized_new') t.status = 'hospitalized_skipping';
                else if (t.status === 'hospitalized_skipping') {
                    t.status = 'normal'; t.energy = 5; t.mind = 5; t.coin -= 2;
                    alert(`🏥 【${t.name}】出院！扣2金幣。` + (Math.random()<0.5 ? (Math.random()<0.5 ? (t.tokens++,"✨ 獲代幣+1") : (t.mind=10,"✨ 獲心態回滿")) : ""));
                }
                t.actionUsed = false;
            });
            state.currentRound++;
            if([3,5].includes(state.currentRound)) { state.teams.forEach(t => { if(t.status==='normal') t.tokens = 2; }); alert("🎉 行動代幣重置為 2！"); }
            timer.reset(); saveState(); renderAll();
        };

        function showEnding() {
            document.getElementById('ending-results').innerHTML = [...state.teams].sort((a,b)=>b.coin-a.coin).map(t => {
                let finalTitle = "無名小卒";
                for(let r of state.config.titles) {
                    if((r.minC===null||t.coin>=r.minC) && (r.maxC===null||t.coin<=r.maxC) && (r.minE===null||t.energy>=r.minE) && (r.maxE===null||t.energy<=r.maxE) && (r.minM===null||t.mind>=r.minM) && (r.maxM===null||t.mind<=r.maxM)) { finalTitle = r.name; break; }
                }
                return `<div class="bg-slate-700 p-4 rounded-2xl relative"><div class="absolute -top-3 right-4 bg-amber-500 text-slate-900 font-black px-3 py-1 rounded-full text-xs">${finalTitle}</div><h4 class="text-xl font-bold text-white">${t.name}</h4><div class="mt-2 text-sm font-black text-amber-400">🪙 ${t.coin} 🔋 ${t.energy} ❤️ ${t.mind}</div></div>`;
            }).join('');
            document.getElementById('ending-modal').classList.remove('hidden');
        }

        window.syncAdmin = function() {
            document.getElementById('cfg-rounds').value = state.config.rounds.join(',');
            document.getElementById('cfg-timer').value = state.config.timer;
            document.getElementById('admin-titles-list').innerHTML = state.config.titles.map((r,i) => `<div class="flex space-x-1 text-[9px] mb-1"><input value="${r.name}" onchange="state.config.titles[${i}].name=this.value;saveState()" class="border p-1 w-1/4"><input value="${r.minC||''}" placeholder="C>=" onchange="state.config.titles[${i}].minC=parseInt(this.value)||null;saveState()" class="border p-1 w-1/8"><input value="${r.maxE||''}" placeholder="E<=" onchange="state.config.titles[${i}].maxE=parseInt(this.value)||null;saveState()" class="border p-1 w-1/8"><button onclick="state.config.titles.splice(${i},1);saveState();syncAdmin()" class="text-rose-500 px-1">刪</button></div>`).join('');
            document.getElementById('admin-team-list').innerHTML = state.teams.map((t,i) => `<div class="flex space-x-1 mb-1 text-xs"><input value="${t.name}" onchange="state.teams[${i}].name=this.value;saveState();renderAll()" class="border p-1 flex-1"><select onchange="state.teams[${i}].profession=this.value;saveState();renderAll()" class="border p-1 flex-1">${Object.keys(state.professions).map(p=>`<option ${t.profession===p?'selected':''}>${p}</option>`).join('')}</select><button onclick="state.teams.splice(${i},1);saveState();syncAdmin();renderAll()" class="text-rose-500">刪</button></div>`).join('');
            
            // 全新渲染的主動抉擇技能設定 UI
            document.getElementById('admin-action-list').innerHTML = state.config.actions.map((a,i) => `
                <div class="bg-white border rounded-xl p-3 text-xs mb-3 shadow-sm">
                    <div class="flex justify-between items-center mb-2 border-b pb-2">
                        <input value="${a.name}" onchange="state.config.actions[${i}].name=this.value;saveState();renderActionTab()" class="border p-1 w-2/3 font-bold text-indigo-700 rounded" placeholder="技能名稱">
                        <button onclick="state.config.actions.splice(${i},1);saveState();syncAdmin();renderActionTab()" class="bg-rose-100 hover:bg-rose-200 text-rose-600 px-2 py-1 rounded font-bold">刪除</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-rose-50 p-2 rounded">
                            <div class="font-bold text-[10px] text-rose-700 mb-1 text-center border-b border-rose-200 pb-1">⚠️ 點擊消耗 (Cost)</div>
                            <div class="grid grid-cols-4 gap-1 text-[10px] text-center">
                                <div>🎟️<input value="${a.tCost}" type="number" onchange="state.config.actions[${i}].tCost=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-rose-600 font-bold mt-1 text-center"></div>
                                <div>🪙<input value="${a.cCost}" type="number" onchange="state.config.actions[${i}].cCost=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-rose-600 font-bold mt-1 text-center"></div>
                                <div>🔋<input value="${a.eCost}" type="number" onchange="state.config.actions[${i}].eCost=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-rose-600 font-bold mt-1 text-center"></div>
                                <div>❤️<input value="${a.mCost}" type="number" onchange="state.config.actions[${i}].mCost=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-rose-600 font-bold mt-1 text-center"></div>
                            </div>
                        </div>
                        <div class="bg-emerald-50 p-2 rounded">
                            <div class="font-bold text-[10px] text-emerald-700 mb-1 text-center border-b border-emerald-200 pb-1">🎁 執行獲得 (Gain)</div>
                            <div class="grid grid-cols-4 gap-1 text-[10px] text-center">
                                <div>🎟️<input value="${a.tGain}" type="number" onchange="state.config.actions[${i}].tGain=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-emerald-600 font-bold mt-1 text-center"></div>
                                <div>🪙<input value="${a.cGain}" type="number" onchange="state.config.actions[${i}].cGain=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-emerald-600 font-bold mt-1 text-center"></div>
                                <div>🔋<input value="${a.eGain}" type="number" onchange="state.config.actions[${i}].eGain=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-emerald-600 font-bold mt-1 text-center"></div>
                                <div>❤️<input value="${a.mGain}" type="number" onchange="state.config.actions[${i}].mGain=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-emerald-600 font-bold mt-1 text-center"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            renderAdminProfessions();
        };

        window.updateConfig = function() { state.config.rounds = document.getElementById('cfg-rounds').value.split(','); state.config.timer = parseInt(document.getElementById('cfg-timer').value)||180; saveState(); renderAll(); };
        window.addNewTitle = function() { state.config.titles.push({name:"新稱號", minC:null,maxC:null,minE:null,maxE:null,minM:null,maxM:null}); saveState(); syncAdmin(); };
        window.addNewTeam = function() { state.teams.push({id:"t_"+Date.now(), name:"新隊伍", profession:Object.keys(state.professions)[0], energy:10, mind:10, coin:0, tokens:2, status:'normal', actionUsed:false}); saveState(); syncAdmin(); renderAll(); };
        window.addNewAction = function() { state.config.actions.push({id:"a_"+Date.now(), name:"新技能", tCost:1, cCost:0, eCost:0, mCost:0, tGain:0, cGain:0, eGain:0, mGain:0}); saveState(); syncAdmin(); };
        window.addNewProfession = function() { let n=document.getElementById("new-profession-name").value; if(n&&!state.professions[n]){state.professions[n]={pools:Array(6).fill().map(()=>[])};document.getElementById("new-profession-name").value="";saveState();syncAdmin();} };
        
        // 全新渲染的雙層折疊職業卡池 UI
        window.renderAdminProfessions = function() {
            document.getElementById('admin-prof-list').innerHTML = Object.keys(state.professions).map(pName => `
                <details class="border-2 border-indigo-100 rounded-xl bg-indigo-50/30 mb-2 overflow-hidden">
                    <summary class="flex justify-between font-black text-indigo-900 p-3 bg-indigo-100/50 cursor-pointer hover:bg-indigo-200/50 transition">
                        <span>💼 職業：${pName}</span>
                        <button onclick="event.preventDefault(); if(confirm('確定刪除此職業？')) { delete state.professions['${pName}']; saveState(); syncAdmin(); }" class="text-rose-600 text-xs bg-white border px-2 py-1 rounded shadow-sm hover:bg-rose-50">刪除職業</button>
                    </summary>
                    <div class="p-3 space-y-3">
                        ${state.professions[pName].pools.map((pool, rIdx) => `
                            <details class="bg-white border rounded shadow-sm overflow-hidden">
                                <summary class="text-xs font-bold bg-slate-100 p-2 cursor-pointer hover:bg-slate-200 flex justify-between items-center transition">
                                    <span>📌 ${state.config.rounds[rIdx] || `回合 ${rIdx+1}`} 卡池 (${pool.length}張)</span>
                                    <button onclick="event.preventDefault(); state.professions['${pName}'].pools[${rIdx}].push({name:'新卡',w:10,text:'',e:0,m:0,c:0}); saveState(); syncAdmin();" class="text-indigo-600 bg-indigo-50 px-2 py-1 rounded shadow-sm">+ 新增卡片</button>
                                </summary>
                                <div class="p-2 space-y-2">
                                    <div class="grid grid-cols-12 gap-1 text-[10px] font-bold text-slate-500 bg-slate-50 p-1 text-center rounded">
                                        <div class="col-span-2 text-left">卡名</div>
                                        <div class="col-span-1">權重</div>
                                        <div class="col-span-3 text-left">事件敘述</div>
                                        <div class="col-span-1">🔋</div>
                                        <div class="col-span-1">❤️</div>
                                        <div class="col-span-1">🪙</div>
                                        <div class="col-span-3">操作</div>
                                    </div>
                                    ${pool.length === 0 ? '<div class="text-center text-[10px] py-2 text-slate-400">尚無卡片，點擊右上方新增</div>' : ''}
                                    ${pool.map((c, i) => `
                                        <div class="grid grid-cols-12 gap-1 text-[10px] items-center border-b pb-1">
                                            <div class="col-span-2"><input value="${c.name||''}" onchange="state.professions['${pName}'].pools[${rIdx}][${i}].name=this.value;saveState()" class="border w-full p-1 rounded placeholder-slate-400" placeholder="卡名"></div>
                                            <div class="col-span-1"><input value="${c.w}" type="number" onchange="state.professions['${pName}'].pools[${rIdx}][${i}].w=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center"></div>
                                            <div class="col-span-3"><input value="${c.text||''}" onchange="state.professions['${pName}'].pools[${rIdx}][${i}].text=this.value;saveState()" class="border w-full p-1 rounded placeholder-slate-400" placeholder="敘述"></div>
                                            <div class="col-span-1 text-emerald-600"><input value="${c.e}" type="number" onchange="state.professions['${pName}'].pools[${rIdx}][${i}].e=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center font-bold"></div>
                                            <div class="col-span-1 text-rose-600"><input value="${c.m}" type="number" onchange="state.professions['${pName}'].pools[${rIdx}][${i}].m=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center font-bold"></div>
                                            <div class="col-span-1 text-amber-600"><input value="${c.c}" type="number" onchange="state.professions['${pName}'].pools[${rIdx}][${i}].c=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center font-bold"></div>
                                            <div class="col-span-3 text-center flex justify-center space-x-1">
                                                <button onclick="state.professions['${pName}'].pools[${rIdx}].splice(${i},1);saveState();syncAdmin()" class="bg-rose-100 hover:bg-rose-200 text-rose-600 px-2 py-1 rounded font-bold transition text-[9px]">刪除</button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </details>
                        `).join('')}
                    </div>
                </details>
            `).join('');
        };

        window.exportData = function() { let a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state)); a.download = "camp.json"; a.click(); };
        window.importData = function(e) { let r = new FileReader(); r.onload=(evt)=>{try{state=JSON.parse(evt.target.result);saveState();location.reload();}catch(err){alert("錯誤");}}; r.readAsText(e.target.files[0]); };

        window.onload = init;
    </script>
</body>
</html>
