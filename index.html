<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童職業體驗營 - 生涯模擬系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .hospitalized-mask { filter: grayscale(100%); opacity: 0.75; position: relative; pointer-events: none; }
        .hospitalized-mask::after { content: "🏥 暫停行動一回合"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); background: rgba(220, 38, 38, 0.9); color: white; padding: 5px 15px; font-weight: 900; border-radius: 8px; border: 2px solid white; font-size: 1.2rem; white-space: nowrap; z-index: 10; }
        details > summary { list-style: none; outline: none; cursor: pointer; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 antialiased flex flex-col">

    <header class="bg-slate-900 text-white px-6 py-4 shadow-md flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">⏳</span>
            <h1 class="text-xl font-bold tracking-wide">生涯模擬系統 <span id="header-prof-badge" class="text-xs bg-indigo-600 px-2 py-0.5 rounded text-white ml-2">載入中</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <div id="global-timer" class="bg-slate-800 px-4 py-1.5 rounded-full font-bold text-sm border border-slate-600 shadow-inner">載入中...</div>
        </div>
    </header>

    <main class="flex-1 max-w-[1800px] w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-80px)] overflow-hidden">
        
        <section class="lg:col-span-8 bg-slate-200/50 rounded-2xl shadow-inner border border-slate-300 p-4 flex flex-col h-full overflow-hidden relative">
            <div class="flex justify-between items-end mb-4 border-b border-slate-300 pb-4 shrink-0">
                <div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest bg-white px-2 py-1 rounded shadow-sm">🎯 遊戲進行中動作控制</span>
                    <div class="flex items-center space-x-3 mt-1">
                        <button id="btn-play-undo" onclick="playUndo()" class="bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm transition flex items-center">
                            <span class="mr-1">↩️</span> 遊戲復原
                        </button>
                        <button id="btn-play-redo" onclick="playRedo()" class="bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm transition flex items-center">
                            遊戲重做 <span class="ml-1">↪️</span>
                        </button>
                        <h2 id="big-timer-display" class="text-2xl font-black text-slate-900 ml-3">Round 1：載入中</h2>
                    </div>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-[10px] text-slate-400 font-bold">討論決策倒數</div>
                        <div id="countdown-display" class="text-3xl font-black text-indigo-600 tabular-nums leading-none">03:00</div>
                    </div>
                    <div class="flex flex-col space-y-1">
                        <button onclick="timer.start()" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 text-[10px] font-bold px-2 py-1 rounded">▶ 開始</button>
                        <button onclick="timer.reset()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px] font-bold px-2 py-1 rounded">🔄 重置</button>
                    </div>
                </div>
            </div>

            <div id="leaderboard-grid" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 custom-scrollbar pb-20"></div>
            
            <div class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-slate-300 p-4 flex justify-between items-center shadow-lg">
                <button id="btn-batch-draw" onclick="executeBatchDraw()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-black text-lg px-8 py-3 rounded-xl shadow-md transition transform hover:scale-105">
                    🎲 全組集體命運抽卡
                </button>
                <button onclick="advanceRound()" class="bg-slate-800 hover:bg-slate-900 text-white font-bold px-6 py-3 rounded-xl shadow transition text-sm">
                    ✅ 結算並推進回合 ➡️
                </button>
            </div>
        </section>

        <section class="lg:col-span-4 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
            <div class="flex space-x-1 p-2 bg-slate-100 border-b border-slate-200 shrink-0">
                <button id="tab-play-btn" onclick="switchTab('play')" class="flex-1 py-2 rounded font-bold text-sm bg-white shadow text-indigo-700 transition">🎮 手動操作區</button>
                <button id="tab-admin-btn" onclick="switchTab('admin')" class="flex-1 py-2 rounded font-bold text-sm text-slate-500 hover:text-slate-800 transition">⚙️ 後台設定</button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-3">
                <div id="tab-play" class="space-y-3">
                    <div class="bg-indigo-50 border border-indigo-200 p-2.5 rounded-lg text-xs text-indigo-800 font-medium">
                        💡 <b>無行動限制：</b>只要還有 🎟️ 代幣，同一回合可多次點擊技能。點錯可點該組右上方的「撤銷上一步」。
                    </div>
                    <div id="action-team-list" class="space-y-2.5"></div>
                </div>

                <div id="tab-admin" class="hidden space-y-3">
                    <div class="bg-indigo-50 border border-indigo-200 p-3 rounded-xl flex items-center justify-between">
                        <span class="text-xs font-bold text-indigo-900">⚙️ 後台設定專用歷史記憶：</span>
                        <div class="flex space-x-2">
                            <button id="btn-admin-undo" onclick="adminUndo()" class="bg-white border text-slate-700 px-2.5 py-1 rounded text-xs font-bold shadow-sm">↩️ 復原設定</button>
                            <button id="btn-admin-redo" onclick="adminRedo()" class="bg-white border text-slate-700 px-2.5 py-1 rounded text-xs font-bold shadow-sm">重做設定 ↪️</button>
                        </div>
                    </div>

                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">1. 全域職業與計時設定</summary>
                        <div class="p-4 space-y-3">
                            <label class="block text-xs font-bold text-slate-600">本局遊戲全班統一職業</label>
                            <select id="cfg-global-prof" onchange="commitAdmin(); state.config.globalProfession=this.value; saveState(); renderAll();" class="w-full border rounded p-1.5 text-xs font-bold text-indigo-700"></select>
                            <label class="block text-xs font-bold text-slate-600 mt-2">倒數計時器 (秒)</label>
                            <input type="number" id="cfg-timer" class="w-full border rounded p-1.5 text-xs" onchange="commitAdmin(); updateConfig()">
                        </div>
                    </details>

                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">2. 結局稱號系統 (區間設定)</summary>
                        <div class="p-4 bg-slate-100/50">
                            <div id="admin-titles-list"></div>
                            <button onclick="commitAdmin(); addNewTitle()" class="w-full bg-indigo-100 text-indigo-700 text-xs font-bold py-2 rounded-lg hover:bg-indigo-200 shadow-sm mt-2">+ 新增稱號規則</button>
                        </div>
                    </details>

                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">3. 隊伍分配</summary>
                        <div class="p-4"><div id="admin-team-list" class="space-y-2"></div><button onclick="commitAdmin(); addNewTeam()" class="w-full mt-3 bg-indigo-100 text-indigo-700 text-xs font-bold py-1.5 rounded hover:bg-indigo-200">+ 新增隊伍</button></div>
                    </details>

                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden" open>
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">4. 主動抉擇技能設定</summary>
                        <div class="p-4"><div id="admin-action-list" class="space-y-3"></div><button onclick="commitAdmin(); addNewAction()" class="w-full mt-3 bg-indigo-100 text-indigo-700 text-xs font-bold py-1.5 rounded hover:bg-indigo-200">+ 新增技能</button></div>
                    </details>

                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden" open>
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 hover:bg-slate-200">5. 職業專屬卡池編輯</summary>
                        <div class="p-4 space-y-4">
                            <div class="flex space-x-2"><input type="text" id="new-profession-name" placeholder="新職業名稱" class="flex-1 border rounded px-2 py-1 text-xs"><button onclick="commitAdmin(); addNewProfession()" class="bg-emerald-600 text-white text-xs font-bold px-3 py-1 rounded">建立職業</button></div>
                            <div id="admin-prof-list" class="space-y-4 border-t pt-4"></div>
                        </div>
                    </details>

                    <div class="bg-rose-50 p-3 rounded-xl border border-rose-200 flex flex-wrap gap-2">
                        <button onclick="exportData()" class="bg-indigo-600 text-white text-[10px] font-bold px-3 py-1.5 rounded shadow">📤 匯出設定檔</button>
                        <label class="bg-emerald-600 text-white text-[10px] font-bold px-3 py-1.5 rounded shadow cursor-pointer">📥 匯入 JSON <input type="file" class="hidden" onchange="importData(event)"></label>
                        <button onclick="resetToDefaultState()" class="bg-red-600 text-white text-[10px] font-bold px-3 py-1.5 rounded shadow">⚠️ 清除重置</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="batch-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl w-full max-w-5xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="bg-slate-900 p-4 text-white text-center relative"><h3 class="text-2xl font-black text-amber-400">🔮 命運結算報告</h3><p class="text-xs text-slate-400 mt-1" id="batch-modal-round"></p></div>
            <div id="batch-results-grid" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 custom-scrollbar bg-slate-100"></div>
            <div class="bg-white p-4 border-t flex justify-center"><button onclick="closeBatchModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-10 py-3 rounded-xl w-full md:w-auto shadow-lg">確認並套用分數</button></div>
        </div>
    </div>

    <div id="ending-modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-50 flex items-center justify-center hidden p-4">
        <div class="bg-slate-800 rounded-3xl max-w-4xl w-full overflow-hidden border-4 border-amber-500 p-8 text-center flex flex-col max-h-[90vh]">
            <h2 class="text-4xl font-black text-amber-400 mb-6 tracking-widest">🏆 3年生涯 終極結算</h2>
            <div id="ending-results" class="flex-1 overflow-y-auto custom-scrollbar grid grid-cols-1 md:grid-cols-2 gap-4 text-left"></div>
            <div class="pt-6 mt-4 border-t border-slate-600"><button onclick="resetToDefaultState()" class="bg-amber-600 hover:bg-amber-500 text-white font-black px-8 py-3 rounded-xl text-lg shadow-lg">開啟全新人生局</button></div>
        </div>
    </div>

    <script>
        const DEFAULT_STATE = {
            config: {
                timer: 180,
                globalProfession: "工程師",
                titles: [
                    { name: "爆肝首富", desc: "追求金錢的極致，卻忘了健康才是本錢。", cOp1: "", cVal1: "", cOp: ">=", cVal: 15, eOp1: "", eVal1: "", eOp: "<", eVal: 5, mOp1: "", mVal1: "", mOp: "", mVal: "" },
                    { name: "快樂窮光蛋", desc: "口袋空空，但每天精力充沛、心態穩健就是最大的財富！", cOp1: "", cVal1: "", cOp: "<=", cVal: 2, eOp1: "", eVal1: "", eOp: "", eVal: "", mOp1: "", mVal1: "", mOp: ">=", mVal: 10 },
                    { name: "平庸社畜", desc: "安安穩穩的過日子，沒有大起大落。", cOp1: "", cVal1: "", cOp: "", cVal: "", eOp1: "", eVal1: "", eOp: "", eVal: "", mOp1: "", mVal1: "", mOp: "", mVal: "" }
                ],
                actions: [
                    { id: "a1", name: "A. 兼差加班", tCost: 1, cCost: 0, eCost: 3, mCost: 1, tGain: 0, cGain: 3, eGain: 0, mGain: 0 },
                    { id: "a2", name: "B. 自費就醫", tCost: 1, cCost: 2, eCost: 0, mCost: 0, tGain: 0, cGain: 0, eGain: 2, mGain: 2 },
                    { id: "a3", name: "C. 佛系躺平", tCost: 1, cCost: 0, eCost: 0, mCost: 0, tGain: 0, cGain: 0, eGain: 4, mGain: 0 }
                ]
            },
            teams: [
                { id: "t1", name: "火箭隊", energy: 10, mind: 10, coin: 0, tokens: 2, actionHistory: [], r6Choice: 0 },
                { id: "t2", name: "夢想家", energy: 10, mind: 10, coin: 0, tokens: 2, actionHistory: [], r6Choice: 0 }
            ],
            professions: {
                "工程師": { 
                    roundNames: ["R1日常", "R2危機", "R3升職", "R4挑戰", "R5巔峰", "R6結局選擇"], 
                    pools: Array(5).fill().map((_, i) => [{ id: `e_${i}_1`, name: `R${i+1}平安無事`, w: 50, text: "日常修Bug。", e: -1, m: -1, c: 2 }, { id: `e_${i}_2`, name: `R${i+1}系統崩潰`, w: 20, text: "搶修！", e: -4, m: -3, c: 5 }]),
                    r6Branches: [
                        { name: "路線A：安穩退休", cards: [{name: "穩定領息", w: 100, text: "平淡見真章", e: 2, m: 2, c: 5}] },
                        { name: "路線B：放手創業", cards: [{name: "大獲成功", w: 30, text: "公司上市", e: -5, m: 5, c: 20}, {name: "投資失敗", w: 70, text: "血本無歸", e: -5, m: -5, c: -10}] }
                    ]
                }
            },
            currentRound: 1, batchResults: null, hasDrawnThisRound: false
        };

        let state = {};
        let playPast = []; let playFuture = [];
        let adminPast = []; let adminFuture = [];
        let timerInterval = null; let timeLeft = 0;

        window.commitPlay = function() { playPast.push(JSON.stringify(state)); if(playPast.length > 50) playPast.shift(); playFuture = []; };
        window.playUndo = function() { if(playPast.length === 0) return; playFuture.push(JSON.stringify(state)); state = sanitizeState(JSON.parse(playPast.pop())); saveState(); renderAll(); };
        window.playRedo = function() { if(playFuture.length === 0) return; playPast.push(JSON.stringify(state)); state = sanitizeState(JSON.parse(playFuture.pop())); saveState(); renderAll(); };

        window.commitAdmin = function() { adminPast.push(JSON.stringify(state)); if(adminPast.length > 50) adminPast.shift(); adminFuture = []; };
        window.adminUndo = function() { if(adminPast.length === 0) return; adminFuture.push(JSON.stringify(state)); state = sanitizeState(JSON.parse(adminPast.pop())); saveState(); syncAdmin(); renderAll(); };
        window.adminRedo = function() { if(adminFuture.length === 0) return; adminPast.push(JSON.stringify(state)); state = sanitizeState(JSON.parse(adminFuture.pop())); saveState(); syncAdmin(); renderAll(); };

        function sanitizeState(st) {
            if (!st) return JSON.parse(JSON.stringify(DEFAULT_STATE));
            if (!st.config) st.config = DEFAULT_STATE.config;
            if (!st.teams) st.teams = DEFAULT_STATE.teams;
            if (!st.professions) st.professions = DEFAULT_STATE.professions;
            if (st.hasDrawnThisRound === undefined) st.hasDrawnThisRound = false;
            
            if (!st.config.globalProfession) st.config.globalProfession = Object.keys(st.professions)[0] || "工程師";
            st.teams.forEach(t => { 
                if (t.r6Choice === undefined) t.r6Choice = 0; 
                if (!t.actionHistory) t.actionHistory = []; 
                delete t.status; delete t.actionUsed; delete t.lastAction;
            });
            
            Object.keys(st.professions).forEach(pName => { 
                let p = st.professions[pName];
                if (!p.pools) p.pools = Array(5).fill().map(() => []); 
                if (!p.roundNames) p.roundNames = ["R1", "R2", "R3", "R4", "R5", "R6結局"];
                if (p.pools.length === 6) { p.r6Branches = [{ name: "預設單一路線", cards: p.pools[5] || [] }]; p.pools.pop(); }
                if (!p.r6Branches) p.r6Branches = [{ name: "預設單一路線", cards: [] }];
                p.r6Branches.forEach(b => { if (!b.cards) b.cards = []; });
            });

            if(st.config.titles) {
                st.config.titles.forEach(t => {
                    if (t.desc === undefined) t.desc = "恭喜獲得該稱號！說明文字可在後台自訂。";
                    if (t.cOp === undefined) { t.cOp = ""; t.cVal = ""; }
                    if (t.eOp === undefined) { t.eOp = ""; t.eVal = ""; }
                    if (t.mOp === undefined) { t.mOp = ""; t.mVal = ""; }
                    if (t.cOp1 === undefined) { t.cOp1 = ""; t.cVal1 = ""; }
                    if (t.eOp1 === undefined) { t.eOp1 = ""; t.eVal1 = ""; }
                    if (t.mOp1 === undefined) { t.mOp1 = ""; t.mVal1 = ""; }
                });
            } else { st.config.titles = DEFAULT_STATE.config.titles; }
            return st;
        }

        const timer = {
            start: () => { if(timerInterval) clearInterval(timerInterval); if(timeLeft <= 0) timeLeft = state.config.timer; timerInterval = setInterval(() => { timeLeft--; timer.updateStr(); if(timeLeft <= 0) { clearInterval(timerInterval); alert("⏳ 時間到！"); } }, 1000); },
            reset: () => { clearInterval(timerInterval); timeLeft = state.config.timer; timer.updateStr(); },
            updateStr: () => { document.getElementById('countdown-display').innerText = `${Math.floor(timeLeft/60).toString().padStart(2,'0')}:${(timeLeft%60).toString().padStart(2,'0')}`; }
        };

        function init() {
            try { state = sanitizeState(JSON.parse(localStorage.getItem("camp_sim_v3")) || JSON.parse(JSON.stringify(DEFAULT_STATE))); } catch(e) { state = sanitizeState(JSON.parse(JSON.stringify(DEFAULT_STATE))); }
            try { playPast = JSON.parse(localStorage.getItem("camp_play_past")) || []; } catch(e) { playPast = []; }
            try { playFuture = JSON.parse(localStorage.getItem("camp_play_future")) || []; } catch(e) { playFuture = []; }
            try { adminPast = JSON.parse(localStorage.getItem("camp_admin_past")) || []; } catch(e) { adminPast = []; }
            try { adminFuture = JSON.parse(localStorage.getItem("camp_admin_future")) || []; } catch(e) { adminFuture = []; }
            timeLeft = state.config.timer; saveState(); syncAdmin(); renderAll();
        }

        function saveState() { 
            localStorage.setItem("camp_sim_v3", JSON.stringify(state)); 
            localStorage.setItem("camp_play_past", JSON.stringify(playPast)); localStorage.setItem("camp_play_future", JSON.stringify(playFuture)); 
            localStorage.setItem("camp_admin_past", JSON.stringify(adminPast)); localStorage.setItem("camp_admin_future", JSON.stringify(adminFuture)); 
        }

        function resetToDefaultState() { if(confirm("確定重置嗎？所有進度將會消失！")) { localStorage.clear(); location.reload(); } }

        window.switchTab = function(tab) {
            document.getElementById('tab-play').classList.toggle('hidden', tab !== 'play');
            document.getElementById('tab-admin').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('tab-play-btn').className = tab==='play' ? "flex-1 py-2 rounded font-bold text-sm bg-white shadow text-indigo-700" : "flex-1 py-2 rounded font-bold text-sm text-slate-500 hover:text-slate-800";
            document.getElementById('tab-admin-btn').className = tab==='admin' ? "flex-1 py-2 rounded font-bold text-sm bg-white shadow text-indigo-700" : "flex-1 py-2 rounded font-bold text-sm text-slate-500 hover:text-slate-800";
        };

        function renderAll() {
            document.getElementById('btn-play-undo').disabled = playPast.length === 0; document.getElementById('btn-play-undo').classList.toggle('opacity-40', playPast.length === 0);
            document.getElementById('btn-play-redo').disabled = playFuture.length === 0; document.getElementById('btn-play-redo').classList.toggle('opacity-40', playFuture.length === 0);
            if(document.getElementById('btn-admin-undo')) { document.getElementById('btn-admin-undo').disabled = adminPast.length === 0; document.getElementById('btn-admin-undo').classList.toggle('opacity-40', adminPast.length === 0); document.getElementById('btn-admin-redo').disabled = adminFuture.length === 0; document.getElementById('btn-admin-redo').classList.toggle('opacity-40', adminFuture.length === 0); }

            document.getElementById('header-prof-badge').innerText = `全班職業：${state.config.globalProfession}`;
            if(state.currentRound > 6) return showEnding();
            const prof = state.professions[state.config.globalProfession];
            document.getElementById('big-timer-display').innerText = `Round ${state.currentRound}：${prof ? prof.roundNames[state.currentRound - 1] : ''}`;
            
            const btnDraw = document.getElementById('btn-batch-draw');
            if(state.hasDrawnThisRound) {
                btnDraw.disabled = true; btnDraw.className = "bg-slate-400 text-slate-100 font-black text-lg px-8 py-3 rounded-xl shadow cursor-not-allowed"; btnDraw.innerHTML = "✅ 本回合已抽卡";
            } else {
                btnDraw.disabled = false; btnDraw.className = "bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-black text-lg px-8 py-3 rounded-xl shadow-md transition transform hover:scale-105"; btnDraw.innerHTML = "🎲 全組集體命運抽卡";
            }
            timer.updateStr(); renderLeaderboard(); renderActionTab();
        }

        function renderLeaderboard() {
            const prof = state.professions[state.config.globalProfession];
            document.getElementById('leaderboard-grid').innerHTML = state.teams.map((t, i) => {

        // 這裡已將所有 🧠 全數同步換成 ❤️ 圖示
        function renderActionTab() {
            document.getElementById('action-team-list').innerHTML = state.teams.map((t, i) => {
                let btns = state.config.actions.map(a => {
                    const ok = (a.tCost===0 || t.tokens>=a.tCost) && (a.cCost===0 || t.coin>=a.cCost) && (a.eCost===0 || t.energy>=a.eCost) && (a.mCost===0 || t.mind>=a.mCost);

                    return `

                return `<div class="border p-2.5 rounded-xl bg-slate-50 shadow-sm"><div class="flex justify-between items-center mb-2"><span class="font-bold text-sm text-slate-800">${t.name}</span><div class="flex items-center space-x-2"><span class="text-xs font-bold bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded">🎟️ ${t.tokens}</span>${t.actionHistory && t.actionHistory.length > 0 ? `<button onclick="undoAction(${i})" class="bg-rose-100 hover:bg-rose-200 text-rose-600 px-2 py-0.5 rounded text-[10px] font-bold transition">⟲ 撤銷上一步</button>` : ''}</div></div><div class="grid grid-cols-2 gap-1.5">${btns}</div></div>`;

        window.tweak = function(idx, f, a) { 
            commitPlay(); state.teams[idx][f] += a; 
            if(f==='energy' || f==='mind') state.teams[idx][f] = Math.min(15, Math.max(0, state.teams[idx][f]));
            saveState(); renderAll(); 
        };

        window.executeBatchDraw = function() {
            if(state.currentRound > 6 || state.hasDrawnThisRound) return;
            const prof = state.professions[state.config.globalProfession];
            if(!prof) return alert("系統找不到當前職業資料，請至後台「1.全域職業設定」選擇本局指定的職業。");

            state.batchResults = state.teams.map((t, i) => {
                let pool = []; let rName = prof.roundNames[state.currentRound-1];
                if(state.currentRound <= 5) { pool = prof.pools[state.currentRound-1] || []; } 
                else { const branch = (prof.r6Branches || [])[t.r6Choice || 0]; if(branch) { pool = branch.cards || []; rName += ` (${branch.name})`; } }
                if(!pool.length) return { teamIdx: i, skipped: true, msg: "⚠️ 發生錯誤：後台無對應卡池資料！" };
                let rand = Math.random() * pool.reduce((s, c) => s + (parseInt(c.w)||0), 0);
                let drawn = pool.find(c => (rand -= (parseInt(c.w)||0)) <= 0) || pool[pool.length-1];
                return { teamIdx: i, card: drawn, roundName: rName };
            });

            document.getElementById('batch-modal-round').innerText = `Round ${state.currentRound}`;
            document.getElementById('batch-results-grid').innerHTML = state.batchResults.map(r => {
                const t = state.teams[r.teamIdx];
                if(r.skipped) return `<div class="bg-slate-200 p-4 rounded-xl text-center opacity-70 flex flex-col justify-center"><h4 class="font-bold text-slate-600">${t.name}</h4><p class="text-rose-600 font-bold mt-2">${r.msg}</p></div>`;
                return `<div class="bg-white border-2 border-indigo-200 p-4 rounded-xl relative"><span class="absolute -top-3 left-4 bg-indigo-600 text-white text-[10px] px-2 py-1 rounded shadow">${t.name} <span class="text-indigo-200 ml-1">${r.roundName}</span></span><h4 class="font-bold mt-3 text-indigo-900 border-b pb-1">${r.card.name}</h4><p class="text-xs my-2 text-slate-600 min-h-[40px]">${r.card.text}</p><div class="grid grid-cols-3 text-center border-t pt-2 gap-1"><div class="bg-slate-50 rounded"><div class="text-[9px] text-slate-400">🔋</div><div class="font-black text-sm ${r.card.e<0?'text-rose-500':'text-emerald-600'}">${r.card.e>0?'+':''}${r.card.e}</div></div><div class="bg-slate-50 rounded"><div class="text-[9px] text-slate-400">❤️</div><div class="font-black text-sm ${r.card.m<0?'text-rose-500':'text-emerald-600'}">${r.card.m>0?'+':''}${r.card.m}</div></div><div class="bg-slate-50 rounded"><div class="text-[9px] text-slate-400">🪙</div><div class="font-black text-sm ${r.card.c<0?'text-rose-500':'text-emerald-600'}">${r.card.c>0?'+':''}${r.card.c}</div></div></div></div>`;
            }).join('');
            document.getElementById('batch-modal').classList.remove('hidden');
        };

        window.closeBatchModal = function() {
            commitPlay();
            state.batchResults.forEach(r => {
                if(!r.skipped && r.card) {
                    let t = state.teams[r.teamIdx];
                    t.energy += parseInt(r.card.e)||0; t.mind += parseInt(r.card.m)||0; t.coin += parseInt(r.card.c)||0;
                    t.energy = Math.min(15, Math.max(0, t.energy)); t.mind = Math.min(15, Math.max(0, t.mind));
                }
            });
            state.hasDrawnThisRound = true;
            document.getElementById('batch-modal').classList.add('hidden'); saveState(); renderAll(); 
        };

        window.executeAction = function(i, aId) {
            commitPlay();
            let t = state.teams[i], a = state.config.actions.find(x => x.id === aId);
            if(!a) return;
            t.tokens -= a.tCost; t.coin -= a.cCost; t.energy -= a.eCost; t.mind -= a.mCost;
            t.tokens += a.tGain; t.coin += a.cGain; t.energy += a.eGain; t.mind += a.mGain;
            t.energy = Math.min(15, Math.max(0, t.energy)); t.mind = Math.min(15, Math.max(0, t.mind));
            t.actionHistory.push(aId); saveState(); renderAll();
        };

        window.undoAction = function(i) {
            commitPlay();
            let t = state.teams[i];
            if(!t.actionHistory || t.actionHistory.length === 0) return;
            let aId = t.actionHistory.pop();
            let a = state.config.actions.find(x => x.id === aId);
            if(a) {
                t.tokens += a.tCost; t.coin += a.cCost; t.energy += a.eCost; t.mind += a.mCost;
                t.tokens -= a.tGain; t.coin -= a.cGain; t.energy -= a.eGain; t.mind -= a.mGain;
                t.energy = Math.min(15, Math.max(0, t.energy)); t.mind = Math.min(15, Math.max(0, t.mind));
            }
            saveState(); renderAll();
        };

        window.advanceRound = function() {
            if(!confirm(`確定要完成本回合決策結算，並推進至下一輪嗎？`)) return;
            commitPlay();
            
            let rescueMsgs = [];
            state.teams.forEach(t => {
                let rescued = false; let msg = `🚑 【${t.name}】`;
                if (t.energy <= 1) {
                    if (t.coin >= 2) { t.coin -= 2; t.energy += 2; msg += `精力見底，觸發「同價低效」急救：扣除 2 金幣，恢復 2 點精力。`; } 
                    else { t.energy += 1; msg += `破產且精力見底，觸發「零元低保」救濟：免費恢復 1 點精力。`; }
                    rescued = true;
                }
                if (t.mind <= 1) {
                    let subMsg = rescued ? `\n> 另外，心態崩潰，觸發` : `心態崩潰，觸發`;
                    if (t.coin >= 2) { t.coin -= 2; t.mind += 2; msg += `${subMsg}「同價低效」急救：扣除 2 金幣，恢復 2 點心態。`; } 
                    else { t.mind += 1; msg += `${subMsg}「零元低保」救濟：免費恢復 1 點心態。`; }
                    rescued = true;
                }
                if (rescued) { rescueMsgs.push(msg); t.energy = Math.min(15, t.energy); t.mind = Math.min(15, t.mind); }
                t.actionHistory = []; 
            });

            if (rescueMsgs.length > 0) { alert(`⚠️ 系統結算緊急救援通知 ⚠️\n\n${rescueMsgs.join('\n\n')}`); }

            state.currentRound++;

            if([3,5].includes(state.currentRound)) { state.teams.forEach(t => { t.tokens = 2; }); alert("🎉 新生涯階段開始！所有隊伍的 🎟️ 行動代幣已補滿至 2 枚！"); }
            timer.reset(); saveState(); renderAll();
        };

        function evalCondLeft(val, op, target) {
            if(val === null || val === "" || val === undefined) return true;
            let v = parseInt(val), t = parseInt(target);
            if(op === '>') return v > t; if(op === '=') return v === t; if(op === '<') return v < t; if(op === '>=') return v >= t; if(op === '<=') return v <= t; return true;
        }

        function evalCondRight(target, op, val) {
            if(val === null || val === "" || val === undefined) return true;
            let t = parseInt(target), v = parseInt(val);
            if(op === '>') return t > v; if(op === '=') return t === v; if(op === '<') return t < v; if(op === '>=') return t >= v; if(op === '<=') return t <= v; return true;
        }

        function showEnding() {
            document.getElementById('ending-results').innerHTML = [...state.teams].sort((a,b)=>b.coin-a.coin).map(t => {
                let finalTitle = "無名小卒"; let finalDesc = "數值未符合任何特殊稱號條件。";
                for(let r of state.config.titles) {
                    let okL = evalCondLeft(r.cVal1, r.cOp1, t.coin) && evalCondLeft(r.eVal1, r.eOp1, t.energy) && evalCondLeft(r.mVal1, r.mOp1, t.mind);
                    let okR = evalCondRight(t.coin, r.cOp, r.cVal) && evalCondRight(t.energy, r.eOp, r.eVal) && evalCondRight(t.mind, r.mOp, r.mVal);
                    if(okL && okR) { finalTitle = r.name; finalDesc = r.desc || ""; break; }
                }
                return `
                <div class="bg-slate-700 p-4 rounded-2xl relative border border-slate-600 flex flex-col justify-between shadow-md">
                    <div><div class="flex justify-between items-start mb-2"><h4 class="text-xl font-black text-white tracking-wide truncate pr-2">${t.name}</h4><span class="bg-amber-400 text-slate-900 font-black px-2.5 py-0.5 rounded-full text-xs shadow shrink-0">${finalTitle}</span></div><p class="text-xs text-slate-300 bg-slate-800/40 p-2 rounded-lg leading-relaxed mb-4">${finalDesc}</p></div>
                    <div class="text-xs font-black text-amber-400 border-t border-slate-600/60 pt-2 flex justify-between"><span>資產：🪙 ${t.coin}</span><span class="text-slate-300">🔋 ${t.energy}  ❤️ ${t.mind}</span></div>
                </div>`;
            }).join('');
            document.getElementById('ending-modal').classList.remove('hidden');
        }

                        <div class="flex items-center justify-center space-x-1 bg-white p-1.5 border border-slate-200 rounded shadow-sm"><input value="${r.mVal1||''}" type="number" onchange="commitAdmin(); state.config.titles[${i}].mVal1=this.value;saveState()" class="w-10 border p-1 rounded text-center bg-slate-50 font-bold" placeholder="空"><select onchange="commitAdmin(); state.config.titles[${i}].mOp1=this.value;saveState()" class="border p-0.5 rounded text-[10px] bg-slate-50 font-bold text-slate-600">${opts(r.mOp1)}</select><span class="font-black text-rose-500 mx-0.5 text-xs">❤️</span><select onchange="commitAdmin(); state.config.titles[${i}].mOp=this.value;saveState()" class="border p-0.5 rounded text-[10px] bg-slate-50 font-bold text-slate-600">${opts(r.mOp)}</select><input value="${r.mVal||''}" type="number" onchange="commitAdmin(); state.config.titles[${i}].mVal=this.value;saveState()" class="w-10 border p-1 rounded text-center bg-slate-50 font-bold" placeholder="空"></div>
                    </div>
                    <div><input value="${r.desc || ''}" onchange="commitAdmin(); state.config.titles[${i}].desc=this.value;saveState()" class="w-full border p-1.5 rounded bg-slate-50/70 text-slate-600" placeholder="🏆 請輸入獲得此稱號時，大螢幕上的恭喜/評語敘述..."></div>
                </div>`).join('');
            
            document.getElementById('admin-team-list').innerHTML = state.teams.map((t,i) => `<div class="flex space-x-1 mb-1 text-xs"><input value="${t.name}" onchange="commitAdmin(); state.teams[${i}].name=this.value;saveState();renderAll()" class="border p-1.5 flex-1 rounded font-bold text-slate-700"><button onclick="commitAdmin(); state.teams.splice(${i},1);saveState();syncAdmin();renderAll()" class="bg-rose-100 text-rose-600 px-3 rounded font-bold">刪除</button></div>`).join('');
            
            document.getElementById('admin-action-list').innerHTML = state.config.actions.map((a,i) => `
                <div class="bg-white border rounded-xl p-3 text-xs mb-3 shadow-sm"><div class="flex justify-between items-center mb-2 border-b pb-2"><input value="${a.name}" onchange="commitAdmin(); state.config.actions[${i}].name=this.value;saveState();renderActionTab()" class="border p-1 w-2/3 font-bold text-indigo-700 rounded" placeholder="技能名稱"><button onclick="commitAdmin(); state.config.actions.splice(${i},1);saveState();syncAdmin();renderActionTab()" class="bg-rose-100 text-rose-600 px-2 py-1 rounded font-bold">刪除</button></div><div class="grid grid-cols-2 gap-2"><div class="bg-rose-50 p-2 rounded"><div class="font-bold text-[10px] text-rose-700 mb-1 text-center border-b border-rose-200 pb-1">⚠️ 點擊消耗 (Cost)</div><div class="grid grid-cols-4 gap-1 text-[10px] text-center"><div>🎟️<input value="${a.tCost}" type="number" onchange="commitAdmin(); state.config.actions[${i}].tCost=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-rose-600 font-bold mt-1 text-center"></div><div>🪙<input value="${a.cCost}" type="number" onchange="commitAdmin(); state.config.actions[${i}].cCost=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-rose-600 font-bold mt-1 text-center"></div><div>🔋<input value="${a.eCost}" type="number" onchange="commitAdmin(); state.config.actions[${i}].eCost=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-rose-600 font-bold mt-1 text-center"></div><div>❤️<input value="${a.mCost}" type="number" onchange="commitAdmin(); state.config.actions[${i}].mCost=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-rose-600 font-bold mt-1 text-center"></div></div></div><div class="bg-emerald-50 p-2 rounded"><div class="font-bold text-[10px] text-emerald-700 mb-1 text-center border-b border-emerald-200 pb-1">🎁 執行獲得 (Gain)</div><div class="grid grid-cols-4 gap-1 text-[10px] text-center"><div>🎟️<input value="${a.tGain}" type="number" onchange="commitAdmin(); state.config.actions[${i}].tGain=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-emerald-600 font-bold mt-1 text-center"></div><div>🪙<input value="${a.cGain}" type="number" onchange="commitAdmin(); state.config.actions[${i}].cGain=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-emerald-600 font-bold mt-1 text-center"></div><div>🔋<input value="${a.eGain}" type="number" onchange="commitAdmin(); state.config.actions[${i}].eGain=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-emerald-600 font-bold mt-1 text-center"></div><div>❤️<input value="${a.mGain}" type="number" onchange="commitAdmin(); state.config.actions[${i}].mGain=parseInt(this.value)||0;saveState();renderActionTab()" class="w-full border p-1 rounded text-emerald-600 font-bold mt-1 text-center"></div></div></div></div></div>
            `).join('');
            renderAdminProfessions();
        };

        window.updateConfig = function() { commitAdmin(); state.config.timer = parseInt(document.getElementById('cfg-timer').value)||180; saveState(); renderAll(); };
        window.addNewTitle = function() { commitAdmin(); state.config.titles.push({name:"新稱號", desc: "", cOp1:"",cVal1:"", cOp:"",cVal:"", eOp1:"",eVal1:"", eOp:"",eVal:"", mOp1:"",mVal1:"", mOp:"",mVal:""}); saveState(); syncAdmin(); };
        window.addNewTeam = function() { commitAdmin(); state.teams.push({id:"t_"+Date.now(), name:"新隊伍", energy:10, mind:10, coin:0, tokens:2, actionHistory:[], r6Choice:0}); saveState(); syncAdmin(); renderAll(); };
        window.addNewAction = function() { commitAdmin(); state.config.actions.push({id:"a_"+Date.now(), name:"新技能", tCost:1, cCost:0, eCost:0, mCost:0, tGain:0, cGain:0, eGain:0, mGain:0}); saveState(); syncAdmin(); };
        window.addNewProfession = function() { let n=document.getElementById("new-profession-name").value; if(n&&!state.professions[n]){ commitAdmin(); state.professions[n]={roundNames:["R1", "R2", "R3", "R4", "R5", "R6結局"], pools:Array(5).fill().map(()=>[]), r6Branches:[{name:"預設路線",cards:[]}]};document.getElementById("new-profession-name").value="";saveState();syncAdmin();} };
        
        window.renderAdminProfessions = function() {
            const profOpen = {}; const roundOpen = {};
            document.querySelectorAll('.prof-details').forEach(el => profOpen[el.dataset.id] = el.open);
            document.querySelectorAll('.round-details').forEach(el => roundOpen[el.dataset.id] = el.open);

            document.getElementById('admin-prof-list').innerHTML = Object.keys(state.professions).map(pName => {
                const prof = state.professions[pName];
                let r1_r5_html = (prof.pools || []).map((pool, rIdx) => `
                    <details class="round-details bg-white border rounded shadow-sm overflow-hidden" data-id="${pName}_${rIdx}" ${roundOpen[pName+'_'+rIdx]?'open':''}>
                        <summary class="text-xs font-bold bg-slate-100 p-2 cursor-pointer hover:bg-slate-200 flex justify-between items-center transition">
                            <div class="flex items-center space-x-2 w-1/2"><span class="text-slate-400">📌 R${rIdx+1} </span><input value="${prof.roundNames[rIdx]}" onchange="commitAdmin(); state.professions['${pName}'].roundNames[${rIdx}]=this.value;saveState();renderAll();" onclick="event.stopPropagation()" class="border-b border-slate-300 bg-transparent px-1 flex-1 focus:bg-white font-bold text-indigo-700" placeholder="自訂回合名稱"></div>
                            <div class="flex items-center space-x-2"><span class="text-slate-500">(${(pool||[]).length}張)</span><button onclick="event.preventDefault(); commitAdmin(); state.professions['${pName}'].pools[${rIdx}].push({name:'新卡',w:10,text:'',e:0,m:0,c:0}); saveState(); syncAdmin();" class="text-indigo-600 bg-indigo-50 px-2 py-1 rounded shadow-sm">+ 新增卡片</button></div>
                        </summary>
                        <div class="p-2 space-y-2">
                            <div class="grid grid-cols-12 gap-1 text-[10px] font-bold text-slate-500 bg-slate-50 p-1 text-center rounded"><div class="col-span-2 text-left">卡名</div><div class="col-span-1">權重</div><div class="col-span-3 text-left">事件敘述</div><div class="col-span-1">🔋</div><div class="col-span-1">❤️</div><div class="col-span-1">🪙</div><div class="col-span-3">操作</div></div>
                            ${(pool||[]).map((c, i) => `<div class="grid grid-cols-12 gap-1 text-[10px] items-center border-b pb-1"><div class="col-span-2"><input value="${c.name||''}" onchange="commitAdmin(); state.professions['${pName}'].pools[${rIdx}][${i}].name=this.value;saveState()" class="border w-full p-1 rounded" placeholder="卡名"></div><div class="col-span-1"><input value="${c.w}" type="number" onchange="commitAdmin(); state.professions['${pName}'].pools[${rIdx}][${i}].w=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center"></div><div class="col-span-3"><input value="${c.text||''}" onchange="commitAdmin(); state.professions['${pName}'].pools[${rIdx}][${i}].text=this.value;saveState()" class="border w-full p-1 rounded" placeholder="敘述"></div><div class="col-span-1 text-emerald-600"><input value="${c.e}" type="number" onchange="commitAdmin(); state.professions['${pName}'].pools[${rIdx}][${i}].e=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center font-bold"></div><div class="col-span-1 text-rose-600"><input value="${c.m}" type="number" onchange="commitAdmin(); state.professions['${pName}'].pools[${rIdx}][${i}].m=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center font-bold"></div><div class="col-span-1 text-amber-600"><input value="${c.c}" type="number" onchange="commitAdmin(); state.professions['${pName}'].pools[${rIdx}][${i}].c=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center font-bold"></div><div class="col-span-3 text-center flex justify-center"><button onclick="commitAdmin(); state.professions['${pName}'].pools[${rIdx}].splice(${i},1);saveState();syncAdmin()" class="bg-rose-100 text-rose-600 px-2 py-1 rounded font-bold text-[9px]">刪除</button></div></div>`).join('')}
                        </div>
                    </details>
                `).join('');

                let r6_html = `
                    <details class="round-details bg-purple-50 border border-purple-200 rounded shadow-sm overflow-hidden mt-3" data-id="${pName}_5" ${roundOpen[pName+'_5']?'open':''}>
                        <summary class="text-xs font-bold bg-purple-100 p-2 cursor-pointer hover:bg-purple-200 flex justify-between items-center transition text-purple-900">
                            <div class="flex items-center space-x-2 w-1/2"><span class="text-purple-600">📌 R6 (結局分歧選擇)</span><input value="${prof.roundNames[5]}" onchange="commitAdmin(); state.professions['${pName}'].roundNames[5]=this.value;saveState();renderAll();" onclick="event.stopPropagation()" class="border-b border-purple-300 bg-transparent px-1 flex-1 focus:bg-white font-bold" placeholder="R6名稱"></div>
                            <button onclick="event.preventDefault(); commitAdmin(); state.professions['${pName}'].r6Branches.push({name:'新選擇路線',cards:[]}); saveState(); syncAdmin();" class="bg-purple-600 text-white px-2 py-1 rounded shadow-sm">+ 新增選擇路線</button>
                        </summary>
                        <div class="p-2 space-y-3">
                            ${(prof.r6Branches || []).map((b, bIdx) => `
                                <div class="border border-purple-200 bg-white p-2 rounded">
                                    <div class="flex justify-between items-center mb-2 pb-2 border-b border-slate-100">
                                        <div class="flex items-center space-x-2"><span class="font-bold text-[10px] text-purple-700">路線名稱：</span><input value="${b.name}" onchange="commitAdmin(); state.professions['${pName}'].r6Branches[${bIdx}].name=this.value;saveState();renderAll();" class="border border-purple-300 p-1 text-[11px] rounded w-48 font-bold text-purple-900"></div>
                                        <div class="flex space-x-2"><button onclick="commitAdmin(); state.professions['${pName}'].r6Branches[${bIdx}].cards.push({name:'新結局卡',w:10,text:'',e:0,m:0,c:0}); saveState(); syncAdmin();" class="text-indigo-600 bg-indigo-50 px-2 py-1 rounded text-[9px] font-bold">+ 新增此路線卡片</button><button onclick="if(confirm('刪除整條路線？')){commitAdmin(); state.professions['${pName}'].r6Branches.splice(${bIdx},1); saveState(); syncAdmin();}" class="text-rose-600 bg-rose-50 px-2 py-1 rounded text-[9px] font-bold">刪除路線</button></div>
                                    </div>
                                    <div class="grid grid-cols-12 gap-1 text-[10px] font-bold text-slate-400 bg-slate-50 p-1 text-center rounded"><div class="col-span-2 text-left">結局卡名</div><div class="col-span-1">權重</div><div class="col-span-3 text-left">事件敘述</div><div class="col-span-1">🔋</div><div class="col-span-1">❤️</div><div class="col-span-1">🪙</div><div class="col-span-3">操作</div></div>
                                    ${(b.cards||[]).length===0?'<div class="text-[10px] text-center text-slate-400 py-1">尚無卡片</div>':''}
                                    ${(b.cards||[]).map((c, i) => `<div class="grid grid-cols-12 gap-1 text-[10px] items-center border-b pb-1 mt-1"><div class="col-span-2"><input value="${c.name||''}" onchange="commitAdmin(); state.professions['${pName}'].r6Branches[${bIdx}].cards[${i}].name=this.value;saveState()" class="border w-full p-1 rounded" placeholder="卡名"></div><div class="col-span-1"><input value="${c.w}" type="number" onchange="commitAdmin(); state.professions['${pName}'].r6Branches[${bIdx}].cards[${i}].w=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center"></div><div class="col-span-3"><input value="${c.text||''}" onchange="commitAdmin(); state.professions['${pName}'].r6Branches[${bIdx}].cards[${i}].text=this.value;saveState()" class="border w-full p-1 rounded" placeholder="敘述"></div><div class="col-span-1 text-emerald-600"><input value="${c.e}" type="number" onchange="commitAdmin(); state.professions['${pName}'].r6Branches[${bIdx}].cards[${i}].e=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center font-bold"></div><div class="col-span-1 text-rose-600"><input value="${c.m}" type="number" onchange="commitAdmin(); state.professions['${pName}'].r6Branches[${bIdx}].cards[${i}].m=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center font-bold"></div><div class="col-span-1 text-amber-600"><input value="${c.c}" type="number" onchange="commitAdmin(); state.professions['${pName}'].r6Branches[${bIdx}].cards[${i}].c=parseInt(this.value)||0;saveState()" class="border w-full p-1 rounded text-center font-bold"></div><div class="col-span-3 text-center flex justify-center"><button onclick="commitAdmin(); state.professions['${pName}'].r6Branches[bIdx].cards.splice(${i},1);saveState();syncAdmin()" class="bg-rose-100 text-rose-600 px-2 py-1 rounded font-bold text-[9px]">刪除</button></div></div>`).join('')}
                                </div>
                            `).join('')}
                        </div>
                    </details>`;

                return `
                <details class="prof-details border-2 border-indigo-100 rounded-xl bg-indigo-50/30 mb-2 overflow-hidden" data-id="${pName}" ${profOpen[pName]?'open':''}>
                    <summary class="flex justify-between font-black text-indigo-900 p-3 bg-indigo-100/50 cursor-pointer hover:bg-indigo-200/50 transition">
                        <span>💼 職業卡池總管：${pName}</span>
                        <button onclick="event.preventDefault(); if(confirm('確定刪除此職業？')) { commitAdmin(); delete state.professions['${pName}']; saveState(); syncAdmin(); }" class="text-rose-600 text-xs bg-white border px-2 py-1 rounded shadow-sm hover:bg-rose-50">刪除整個職業</button>
                    </summary>
                    <div class="p-3 space-y-1">
                        ${r1_r5_html}
                        ${r6_html}
                    </div>
                </details>`;
            }).join('');
        };

        window.exportData = function() { let a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state)); a.download = "camp.json"; a.click(); };
        window.importData = function(e) { let r = new FileReader(); r.onload=(evt)=>{try{state=sanitizeState(JSON.parse(evt.target.result));saveState();location.reload();}catch(err){alert("錯誤");}}; r.readAsText(e.target.files[0]); };

        window.onload = init;
    </script>
</body>
</html>
