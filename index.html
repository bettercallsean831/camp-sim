<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兒童職業體驗營 - 6回合終極生存版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* 住院濾鏡特效 */
        .hospitalized-mask {
            filter: grayscale(100%);
            opacity: 0.75;
            position: relative;
            pointer-events: none;
        }
        .hospitalized-mask::after {
            content: "🏥 暫停行動一回合";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-10deg);
            background: rgba(220, 38, 38, 0.9);
            color: white; padding: 5px 15px; font-weight: 900;
            border-radius: 8px; border: 2px solid white;
            font-size: 1.2rem; white-space: nowrap;
            z-index: 10;
        }
        
        /* 自訂折疊選單樣式 */
        details > summary { list-style: none; outline: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 antialiased flex flex-col">

    <header class="bg-slate-900 text-white px-6 py-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">⏳</span>
            <h1 class="text-xl font-bold tracking-wide">生涯模擬系統 <span class="text-xs bg-rose-600 px-2 py-0.5 rounded text-white ml-2">6 回合制</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <div id="global-timer" class="bg-slate-800 px-4 py-1.5 rounded-full font-bold text-sm border border-slate-600 shadow-inner">
                載入中...
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-[1800px] w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-80px)] overflow-hidden">
        
        <section class="lg:col-span-8 bg-slate-200/50 rounded-2xl shadow-inner border border-slate-300 p-4 flex flex-col h-full overflow-hidden relative">
            
            <div class="flex justify-between items-end mb-4 border-b border-slate-300 pb-4">
                <div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest bg-white px-2 py-1 rounded shadow-sm">當前進度</span>
                    <h2 id="big-timer-display" class="text-3xl font-black text-slate-900 mt-1">Round 1：第一年 上半年</h2>
                </div>
                
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex items-center space-x-4">
                    <div class="text-right">
                        <div class="text-[10px] text-slate-400 font-bold">主動抉擇階段 倒數</div>
                        <div id="countdown-display" class="text-3xl font-black text-indigo-600 tabular-nums">03:00</div>
                    </div>
                    <div class="flex flex-col space-y-1">
                        <button onclick="timer.start()" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 text-[10px] font-bold px-2 py-1 rounded">▶ 開始</button>
                        <button onclick="timer.reset()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px] font-bold px-2 py-1 rounded">🔄 重置</button>
                    </div>
                </div>
            </div>

            <div id="leaderboard-grid" class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 custom-scrollbar pb-10">
                </div>
            
            <div class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur border-t border-slate-300 p-4 flex justify-between items-center shadow-lg">
                <button id="batch-draw-btn" onclick="executeBatchDraw()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-black text-lg px-8 py-3 rounded-xl shadow-md transition transform hover:scale-105">
                    🎲 全組集體命運抽卡
                </button>
                <button id="advance-round-btn" onclick="advanceRound()" class="bg-slate-800 hover:bg-slate-900 text-white font-bold px-6 py-3 rounded-xl shadow transition text-sm">
                    推進至下一回合 ➡️
                </button>
            </div>
        </section>

        <section class="lg:col-span-4 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
            <div class="flex space-x-1 p-2 bg-slate-100 border-b border-slate-200">
                <button id="tab-play-btn" onclick="switchTab('play')" class="flex-1 py-2 rounded font-bold text-sm bg-white shadow text-indigo-700 transition">🎮 老師手動操作區</button>
                <button id="tab-admin-btn" onclick="switchTab('admin')" class="flex-1 py-2 rounded font-bold text-sm text-slate-500 hover:text-slate-800 transition">⚙️ 後台完整設定</button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-4">
                <div id="tab-play" class="space-y-4">
                    <div class="bg-indigo-50 border border-indigo-200 p-3 rounded-lg text-xs text-indigo-800 font-medium">
                        💡 <b>提示：</b> 抽卡由左下方大按鈕統一執行。抽卡結束後，請啟動計時器，各組若要消耗行動代幣，請在此區域點擊對應技能結算。
                    </div>
                    <h3 class="font-bold text-slate-800 border-b pb-2 mb-2">主動技能抉擇 (消耗 🎟️ 代幣)</h3>
                    <div id="action-team-list" class="space-y-3"></div>
                </div>

                <div id="tab-admin" class="hidden space-y-4">
                    
                    <details class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden" open>
                        <summary class="bg-slate-200/70 p-3 font-bold text-sm text-slate-700 cursor-pointer hover:bg-slate-200">1. 回合與基本設定</summary>
                        <div class="p-4 space-y-3">
                            <label class="block text-xs font-bold text-slate-600">6 回合自訂名稱 (用逗號隔開)</label>
                            <input type
